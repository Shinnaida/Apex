name: Build Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "17"

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.100

      - name: Show .NET SDK
        run: dotnet --version

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore .\PeakFinal\PeakFinal.csproj -p:TargetFramework=net9.0-android -p:TargetFrameworks=net9.0-android

      - name: Publish Android APK
        run: dotnet publish .\PeakFinal\PeakFinal.csproj -f net9.0-android -c Release --no-restore -p:TargetFramework=net9.0-android -p:TargetFrameworks=net9.0-android -p:AndroidPackageFormat=apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apex-android-apk
          path: PeakFinal\bin\Release\net9.0-android\publish\*.apk
          if-no-files-found: error
          retention-days: 14
